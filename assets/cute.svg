<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5e3f0"/>
      <stop offset="100%" stop-color="#e8d2e8"/>
    </linearGradient>
    <radialGradient id="heart" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#e9a8d4"/>
      <stop offset="100%" stop-color="#c789b3"/>
    </radialGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffb8c0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffb8c0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="240" height="240" fill="url(#bg)"/>

  <!-- 装饰小星星 -->
  <g fill="#fff" opacity="0.6">
    <circle cx="30" cy="40" r="1.5"/>
    <circle cx="200" cy="30" r="2"/>
    <circle cx="220" cy="80" r="1.2"/>
    <circle cx="20" cy="160" r="1.5"/>
    <circle cx="210" cy="200" r="1.2"/>
  </g>
  <g fill="#fff" opacity="0.9">
    <path d="M50,90 l1.5,3 l3,1 l-3,1 l-1.5,3 l-1.5,-3 l-3,-1 l3,-1 z"/>
    <path d="M190,150 l1.5,3 l3,1 l-3,1 l-1.5,3 l-1.5,-3 l-3,-1 l3,-1 z"/>
  </g>

  <!-- 大爱心气球 -->
  <g transform="translate(120, 75)">
    <!-- 高光 -->
    <ellipse cx="-12" cy="-15" rx="10" ry="6" fill="#fff" opacity="0.6"/>
    <!-- 心形主体 -->
    <path d="M0,30 C-30,5 -45,-15 -25,-30 C-10,-38 0,-25 0,-15 C0,-25 10,-38 25,-30 C45,-15 30,5 0,30 Z"
          fill="url(#heart)" stroke="#a76795" stroke-width="1.5"/>
    <!-- 高光 -->
    <ellipse cx="-10" cy="-15" rx="6" ry="4" fill="#fff" opacity="0.5"/>
  </g>

  <!-- 爱心系绳 -->
  <path d="M120,105 Q118,130 122,150" stroke="#a76795" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- 小角色：圆滚滚的身体 -->
  <g transform="translate(120, 175)">
    <!-- 阴影 -->
    <ellipse cx="0" cy="38" rx="35" ry="4" fill="#a76795" opacity="0.15"/>
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="38" ry="32" fill="#ffffff" stroke="#cdb3c5" stroke-width="1.5"/>
    <!-- 腮红 -->
    <ellipse cx="-22" cy="6" rx="10" ry="6" fill="url(#cheek)"/>
    <ellipse cx="22" cy="6" rx="10" ry="6" fill="url(#cheek)"/>
    <!-- 大眼睛 -->
    <ellipse cx="-12" cy="-4" rx="6" ry="8" fill="#3a2a3a"/>
    <ellipse cx="12" cy="-4" rx="6" ry="8" fill="#3a2a3a"/>
    <!-- 眼神光 -->
    <ellipse cx="-10" cy="-7" rx="2.2" ry="2.8" fill="#ffffff"/>
    <ellipse cx="14" cy="-7" rx="2.2" ry="2.8" fill="#ffffff"/>
    <ellipse cx="-13" cy="-2" rx="1" ry="1.4" fill="#ffffff" opacity="0.7"/>
    <ellipse cx="11" cy="-2" rx="1" ry="1.4" fill="#ffffff" opacity="0.7"/>
    <!-- 小嘴 -->
    <path d="M-3,8 Q0,11 3,8" stroke="#3a2a3a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- 小手举起来 -->
    <ellipse cx="-32" cy="-12" rx="6" ry="8" fill="#ffffff" stroke="#cdb3c5" stroke-width="1.5"/>
    <ellipse cx="32" cy="-12" rx="6" ry="8" fill="#ffffff" stroke="#cdb3c5" stroke-width="1.5"/>
  </g>
</svg>
